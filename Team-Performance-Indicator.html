<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performance Intelligence — Score History</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Design tokens: clean professional light ── */
:root {
  --bg:        #f0f2f5;
  --bg2:       #e8eaed;
  --surface:   #ffffff;
  --surface2:  #f7f8fa;
  --surface3:  #eef0f3;
  --border:    #e2e5ea;
  --border2:   #d0d4db;
  --ink:       #111827;
  --ink2:      #374151;
  --muted:     #9ca3af;
  --blue:      #2563eb;
  --blue-lt:   #eff6ff;
  --blue-dim:  rgba(37,99,235,0.08);
  --teal:      #0d9488;
  --teal-lt:   #f0fdfa;
  --teal-dim:  rgba(13,148,136,0.08);
  --amber:     #d97706;
  --amber-lt:  #fffbeb;
  --amber-dim: rgba(217,119,6,0.08);
  --rose:      #e11d48;
  --rose-lt:   #fff1f2;
  --rose-dim:  rgba(225,29,72,0.08);
  --green:     #059669;
  --green-lt:  #ecfdf5;
  --green-dim: rgba(5,150,105,0.08);
  --violet:    #7c3aed;
  --orange:    #ea580c;
  --font: 'Plus Jakarta Sans', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --r: 10px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow:    0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 14px; scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── Shell ── */
.shell { display: flex; min-height: 100vh; }

/* ── Sidebar ── */
.sidebar {
  width: 236px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
  box-shadow: var(--shadow-sm);
}
.sb-brand {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--border);
}
.sb-logo { display: flex; align-items: center; gap: 9px; margin-bottom: 2px; }
.sb-icon {
  width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  box-shadow: 0 2px 8px rgba(37,99,235,0.3);
}
.sb-name { font-size: 15px; font-weight: 800; color: var(--ink); letter-spacing: -0.02em; }
.sb-ver { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 0.08em; margin-top: 3px; }

.nav-sec {
  padding: 18px 14px 5px;
  font-family: var(--mono); font-size: 8.5px;
  letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted);
}
.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 14px; margin: 1px 6px;
  border-radius: 8px; cursor: pointer;
  font-size: 12.5px; font-weight: 500; color: var(--ink2);
  transition: all 0.14s; position: relative;
  user-select: none;
}
.nav-item:hover { background: var(--surface2); color: var(--ink); }
.nav-item.active {
  background: var(--blue-dim); color: var(--blue); font-weight: 600;
}
.nav-item.active::before {
  content: ''; position: absolute; left: -6px; top: 50%;
  transform: translateY(-50%);
  width: 3px; height: 18px; background: var(--blue); border-radius: 0 3px 3px 0;
}
.ni-dot {
  width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0;
  background: var(--surface3);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--muted); transition: all 0.14s;
}
.nav-item.active .ni-dot { background: var(--blue-dim); color: var(--blue); }

.sb-footer {
  margin-top: auto; padding: 14px;
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 6px;
}
.sb-stat {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 10px; background: var(--surface2);
  border-radius: 7px; border: 1px solid var(--border);
}
.sb-stat-l { font-size: 10.5px; color: var(--muted); font-weight: 500; }
.sb-stat-v { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--ink); }

/* ── Main ── */
.main { flex: 1; overflow-y: auto; padding: 28px 28px 64px; min-width: 0; }

/* ── Page header ── */
.pg-hd { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; gap: 14px; flex-wrap: wrap; }
.pg-title { font-size: 23px; font-weight: 800; color: var(--ink); letter-spacing: -0.03em; line-height: 1.1; }
.pg-sub { font-size: 12px; color: var(--muted); margin-top: 4px; font-weight: 400; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 8px 16px; border-radius: 8px;
  font-family: var(--font); font-size: 12.5px; font-weight: 600;
  cursor: pointer; border: none; letter-spacing: 0.01em;
  transition: all 0.14s; white-space: nowrap;
}
.btn-primary { background: var(--blue); color: #fff; }
.btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,0.35); }
.btn-ghost { background: var(--surface); color: var(--ink2); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--surface2); color: var(--ink); border-color: var(--border2); }
.btn-danger { background: var(--rose-lt); color: var(--rose); border: 1px solid rgba(225,29,72,0.2); }
.btn-danger:hover { background: rgba(225,29,72,0.12); }
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

/* ── KPI ── */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 12px; margin-bottom: 22px; }
.kpi-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px 18px;
  animation: fadeUp 0.35s ease both;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.18s, transform 0.14s;
  position: relative; overflow: hidden;
}
.kpi-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
.kpi-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 3px; border-radius: var(--r) var(--r) 0 0;
}
.kc-blue::before   { background: linear-gradient(90deg, #2563eb, #6366f1); }
.kc-teal::before   { background: linear-gradient(90deg, #0d9488, #0891b2); }
.kc-amber::before  { background: linear-gradient(90deg, #d97706, #ea580c); }
.kc-green::before  { background: linear-gradient(90deg, #059669, #16a34a); }
.kc-violet::before { background: linear-gradient(90deg, #7c3aed, #db2777); }
.kc-rose::before   { background: linear-gradient(90deg, #e11d48, #f97316); }

.kpi-ico {
  width: 30px; height: 30px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; margin-bottom: 10px;
}
.kc-blue .kpi-ico   { background: var(--blue-lt); }
.kc-teal .kpi-ico   { background: var(--teal-lt); }
.kc-amber .kpi-ico  { background: var(--amber-lt); }
.kc-green .kpi-ico  { background: var(--green-lt); }
.kc-violet .kpi-ico { background: #f5f3ff; }
.kc-rose .kpi-ico   { background: var(--rose-lt); }

.kpi-val { font-size: 27px; font-weight: 800; color: var(--ink); letter-spacing: -0.03em; line-height: 1; }
.kpi-lbl { font-size: 11px; color: var(--muted); margin-top: 5px; font-weight: 500; }

/* ── Card ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden;
  margin-bottom: 18px; animation: fadeUp 0.35s ease both;
  box-shadow: var(--shadow-sm);
}
.card-hd {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  gap: 10px; flex-wrap: wrap;
  background: var(--surface);
}
.card-title { font-size: 13.5px; font-weight: 700; color: var(--ink); }
.card-meta { font-size: 11px; color: var(--muted); }

/* ── Filter bar ── */
.fbar {
  display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end;
  padding: 12px 18px; border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
.fg { display: flex; flex-direction: column; gap: 4px; }
.fl { font-family: var(--mono); font-size: 8.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.fc {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 7px; color: var(--ink);
  font-family: var(--font); font-size: 12.5px; padding: 6px 10px;
  outline: none; transition: border-color 0.14s, box-shadow 0.14s;
  min-width: 115px;
}
.fc:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }

/* ── Table ── */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
thead tr { background: var(--surface2); }
th {
  padding: 9px 14px; text-align: left;
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted); font-weight: 500;
  white-space: nowrap; cursor: pointer; user-select: none; transition: color 0.14s;
  border-bottom: 1px solid var(--border);
}
th:hover { color: var(--ink2); }
th.sa::after { content: ' ↑'; color: var(--blue); }
th.sd::after { content: ' ↓'; color: var(--blue); }
td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--ink2); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tbody tr { transition: background 0.1s; }
tbody tr:hover td { background: var(--surface2); }

.cn { font-weight: 700; color: var(--ink); font-size: 13px; }
.cr { font-size: 11px; color: var(--muted); margin-top: 1px; }
.cm { font-family: var(--mono); font-size: 11px; color: var(--muted); }

/* Type badges */
.tbadge {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 5px;
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.04em; border: 1px solid;
}
.tEmp { background: var(--blue-lt);  color: var(--blue);   border-color: rgba(37,99,235,0.2); }
.tCon { background: var(--amber-lt); color: var(--amber);  border-color: rgba(217,119,6,0.2); }
.tSub { background: var(--teal-lt);  color: var(--teal);   border-color: rgba(13,148,136,0.2); }

/* Score cell */
.sw { display: flex; flex-direction: column; gap: 3px; }
.sn { font-family: var(--mono); font-size: 13px; font-weight: 700; }
.st { width: 70px; height: 4px; background: var(--surface3); border-radius: 100px; overflow: hidden; }
.sf { height: 100%; border-radius: 100px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
.delta { font-family: var(--mono); font-size: 9.5px; font-weight: 600; }
.du { color: var(--green); } .dd { color: var(--rose); } .dn { color: var(--muted); }

/* Grade pill */
.gpill {
  display: inline-flex; padding: 2px 7px; border-radius: 4px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.06em;
  border: 1px solid; font-family: var(--mono);
}

/* Sparkline */
.spark { display: inline-flex; align-items: flex-end; gap: 2px; height: 18px; }
.spk { width: 5px; border-radius: 2px 2px 0 0; }

/* Row actions */
.racts { display: flex; gap: 4px; }
.abtn {
  width: 26px; height: 26px; border-radius: 6px;
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); cursor: pointer; font-size: 11px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.14s;
}
.abtn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-lt); }
.abtn.d:hover { border-color: var(--rose); color: var(--rose); background: var(--rose-lt); }

/* Two col */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 18px; }
@media(max-width:820px) { .two-col { grid-template-columns: 1fr; } }

/* Top performers */
.top-i { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
.top-i:last-child { border-bottom: none; }
.trk { font-family: var(--mono); font-size: 11px; font-weight: 700; width: 18px; text-align: center; flex-shrink: 0; }
.trk1 { color: #d97706; } .trk2 { color: #6b7280; } .trk3 { color: #92400e; } .trkn { color: var(--muted); }
.ti { flex: 1; min-width: 0; }
.tn { font-size: 12.5px; font-weight: 700; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tm { font-size: 11px; color: var(--muted); margin-top: 1px; }
.ts { font-family: var(--mono); font-size: 15px; font-weight: 700; flex-shrink: 0; }

/* Param bars */
.pbars { display: flex; flex-direction: column; gap: 8px; padding: 14px 18px; }
.pbr { display: flex; align-items: center; gap: 8px; }
.pbl { font-size: 11px; color: var(--ink2); width: 118px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pbt { flex: 1; height: 6px; background: var(--surface3); border-radius: 100px; overflow: hidden; }
.pbf { height: 100%; border-radius: 100px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
.pbv { font-family: var(--mono); font-size: 10.5px; color: var(--ink2); width: 28px; text-align: right; flex-shrink: 0; }

/* Period view */
.pb { margin-bottom: 24px; }
.ph { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.pl { font-size: 17px; font-weight: 800; color: var(--ink); letter-spacing: -0.02em; }
.ps { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.pst { font-size: 11.5px; color: var(--muted); }
.pst strong { color: var(--ink2); font-weight: 600; }

/* Add form */
.fsec { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 18px; animation: fadeUp 0.35s ease both; box-shadow: var(--shadow-sm); }
.fsh { display: flex; justify-content: space-between; align-items: center; padding: 13px 18px; cursor: pointer; border-bottom: 1px solid transparent; transition: all 0.14s; }
.fsh:hover { background: var(--surface2); }
.fsh.open { border-bottom-color: var(--border); }
.fsh-t { font-size: 13px; font-weight: 700; color: var(--ink); }
.fsh-tog { font-size: 17px; color: var(--muted); transition: transform 0.2s; line-height: 1; }
.fsh.open .fsh-tog { transform: rotate(45deg); color: var(--blue); }
.fb { display: none; padding: 20px 18px; }
.fb.open { display: block; }

.fgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 12px; margin-bottom: 16px; }
.ff { display: flex; flex-direction: column; gap: 4px; }
.ff label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.fi {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 7px; color: var(--ink);
  font-family: var(--font); font-size: 12.5px; padding: 8px 10px;
  outline: none; transition: border-color 0.14s, box-shadow 0.14s;
}
.fi:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); background: #fff; }
.fi option { background: #fff; }
textarea.fi { resize: vertical; min-height: 64px; line-height: 1.5; }

.pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(205px, 1fr)); gap: 10px; margin-bottom: 16px; }
.pf { padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; }
.pf-name { font-size: 11.5px; color: var(--ink2); font-weight: 600; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
.pf-name span { font-family: var(--mono); font-size: 9px; color: var(--muted); background: var(--surface3); padding: 1px 5px; border-radius: 4px; }
.srow { display: flex; flex-direction: row-reverse; gap: 2px; }
.srow input { display: none; }
.srow label { font-size: 21px; cursor: pointer; color: #d1d5db; transition: color 0.1s, transform 0.1s; line-height: 1; }
.srow input:checked ~ label,
.srow label:hover,
.srow label:hover ~ label { color: #f59e0b; }
.srow label:hover { transform: scale(1.13); }

/* Section divider */
.sdiv { display: flex; align-items: center; gap: 10px; margin: 14px 0; }
.sdlbl { font-family: var(--mono); font-size: 8.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
.sdline { flex: 1; height: 1px; background: var(--border); }

/* Compare table */
.cmptbl th, .cmptbl td { padding: 8px 10px; font-size: 11px; }
.cmptbl th { font-size: 8.5px; }

/* Modal */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(17, 24, 39, 0.45);
  z-index: 100; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 26px;
  max-width: 540px; width: 93%; max-height: 88vh; overflow-y: auto;
  animation: popIn 0.2s cubic-bezier(.34,1.56,.64,1);
  position: relative; box-shadow: 0 16px 48px rgba(0,0,0,0.18);
}
@keyframes popIn { from{opacity:0;transform:scale(.94) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }
.mclose {
  position: absolute; top: 13px; right: 14px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; width: 26px; height: 26px; font-size: 13px;
  cursor: pointer; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.14s;
}
.mclose:hover { background: var(--rose-lt); color: var(--rose); border-color: rgba(225,29,72,0.2); }
.mtitle { font-size: 17px; font-weight: 800; color: var(--ink); letter-spacing: -0.02em; margin-bottom: 2px; }
.msub { font-size: 11.5px; color: var(--muted); margin-bottom: 18px; line-height: 1.5; }

.dsr { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; flex-wrap: wrap; }
.dbig { font-family: var(--mono); font-size: 42px; font-weight: 700; letter-spacing: -0.03em; line-height: 1; }

.dpr { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); }
.dpr:last-child { border-bottom: none; }
.dpn { font-size: 11.5px; color: var(--ink2); flex: 1; }
.dps { color: #f59e0b; font-size: 12px; letter-spacing: 1px; flex-shrink: 0; }
.dpv { font-family: var(--mono); font-size: 11px; color: var(--muted); width: 20px; text-align: right; }
.dpc { font-family: var(--mono); font-size: 10px; color: var(--muted); width: 60px; text-align: right; }

.hl { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); }
.hl:last-child { border-bottom: none; }
.hld { font-family: var(--mono); font-size: 10px; color: var(--muted); width: 78px; flex-shrink: 0; }
.hlb { flex: 1; height: 4px; background: var(--surface3); border-radius: 100px; overflow: hidden; }
.hlf { height: 100%; border-radius: 100px; }
.hls { font-family: var(--mono); font-size: 12px; font-weight: 700; width: 34px; text-align: right; flex-shrink: 0; }
.hlt { font-family: var(--mono); font-size: 8.5px; color: var(--blue); letter-spacing: 0.08em; }

/* Toast */
.toast {
  position: fixed; bottom: 22px; right: 22px;
  background: var(--ink); color: #fff;
  border-radius: 9px; padding: 10px 16px; font-size: 12.5px;
  z-index: 200; transform: translateY(60px); opacity: 0;
  transition: all 0.25s cubic-bezier(.4,0,.2,1);
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}
.toast.show { transform: translateY(0); opacity: 1; }
.tdot { width: 6px; height: 6px; border-radius: 50%; background: #34d399; flex-shrink: 0; }

/* Empty state */
.empty { padding: 52px 20px; text-align: center; }
.empty-ico { font-size: 38px; margin-bottom: 10px; opacity: 0.3; }
.empty-t { font-size: 14px; font-weight: 700; color: var(--ink2); margin-bottom: 5px; }
.empty-s { font-size: 12px; color: var(--muted); }

@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 100px; }

@media(max-width:720px) {
  .sidebar { display: none; }
  .main { padding: 18px 14px 48px; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
}
@media print {
  .sidebar, .fbar, .racts, .btn-group, .toast { display: none !important; }
  .shell { display: block; } .main { padding: 0; }
  .card, .kpi-card { box-shadow: none; border: 1px solid #ddd; }
}
</style>
</head>
<body oncontextmenu="return false">
<div class="shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sb-brand">
      <div class="sb-logo">
        <div class="sb-icon">📊</div>
        <div class="sb-name">Entrust India</div>
      </div>
      <div class="sb-ver">TEAM PERFORMANCE INDICATOR</div>
    </div>

    <div class="nav-sec">Analytics</div>
    <div class="nav-item active" onclick="sw('dashboard')"><span class="ni-dot">◈</span> Dashboard</div>
    <div class="nav-item" onclick="sw('monthly')"><span class="ni-dot">◷</span> Monthly View</div>
    <div class="nav-item" onclick="sw('quarterly')"><span class="ni-dot">◎</span> Quarterly View</div>
    <div class="nav-item" onclick="sw('annual')"><span class="ni-dot">◉</span> Annual View</div>
    <div class="nav-item" onclick="sw('compare')"><span class="ni-dot">⊞</span> Compare</div>

    <div class="nav-sec">Data</div>
    <div class="nav-item" onclick="sw('add')"><span class="ni-dot">+</span> Add Evaluation</div>
    <div class="nav-item" onclick="exportCSV()"><span class="ni-dot">↓</span> Export CSV</div>
    <div class="nav-item" onclick="confirmClear()"><span class="ni-dot">✕</span> Clear All Data</div>

    <div class="sb-footer">
      <div class="sb-stat"><span class="sb-stat-l">Total Records</span><span class="sb-stat-v" id="sbT">0</span></div>
      <div class="sb-stat"><span class="sb-stat-l">People Tracked</span><span class="sb-stat-v" id="sbP">0</span></div>
      <div class="sb-stat"><span class="sb-stat-l">Avg Score</span><span class="sb-stat-v" id="sbA">—</span></div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main" id="mainArea"></main>
</div>

<!-- Detail modal -->
<div class="overlay" id="mo">
  <div class="modal">
    <button class="mclose" onclick="cm()">✕</button>
    <div id="mb"></div>
  </div>
</div>

<!-- Confirm modal -->
<div class="overlay" id="confirmModal">
  <div class="modal" style="max-width:380px">
    <div class="mtitle" id="confirmTitle">Confirm</div>
    <div class="msub" id="confirmMsg"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" id="confirmOkBtn">Confirm</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"><div class="tdot"></div><span id="tmsg"></span></div>

<script>
// ── Parameters ──────────────────────────────────────────────────
const P = [
  {id:1,  name:"Technical Skills",            s:"Tech Skills",      w:20},
  {id:2,  name:"Code / Work Quality",          s:"Work Quality",     w:15},
  {id:3,  name:"Problem-Solving Ability",      s:"Problem-Solving",  w:15},
  {id:4,  name:"Project Delivery & TAT",       s:"Delivery/TAT",     w:10},
  {id:5,  name:"Communication Skills",         s:"Communication",    w:10},
  {id:6,  name:"Team Collaboration",           s:"Collaboration",    w:8},
  {id:7,  name:"Initiative & Innovation",      s:"Innovation",       w:7},
  {id:8,  name:"Attendance & Reliability",     s:"Attendance",       w:5},
  {id:9,  name:"Client/Stakeholder Handling",  s:"Client Handling",  w:5},
  {id:10, name:"Learning & Growth Mindset",    s:"Growth Mindset",   w:5},
];
const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── State ───────────────────────────────────────────────────────
let recs   = JSON.parse(localStorage.getItem('ph_v3') || '[]');
let view   = 'dashboard';
let sCol   = 'date', sDir = -1;
let fSr    = '', fTy = '', fYr = '';
let _idCtr = Date.now(); // monotonic counter for IDs

// Deduplicate on load (safety net for any legacy duplicates)
(function dedup() {
  const seen = new Set();
  recs = recs.filter(r => {
    // Key: name + date for true duplicate detection
    const k = `${(r.name||'').trim().toLowerCase()}|${r.date}`;
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  });
  _persist();
})();

// ── Helpers ─────────────────────────────────────────────────────
function _persist() { localStorage.setItem('ph_v3', JSON.stringify(recs)); }
function save()     { _persist(); usb(); }

function uid() {
  // Guaranteed unique: timestamp + auto-increment + random
  return `${Date.now()}_${++_idCtr}_${Math.random().toString(36).slice(2,7)}`;
}

function ws(r) {
  return P.reduce((a, p) => a + (r.ratings[p.id] || 0) * p.w / 100, 0);
}

function grade(s) {
  if (s >= 4.5)  return {l:'EXCEPTIONAL', c:'#059669', b:'rgba(5,150,105,0.08)',  bd:'rgba(5,150,105,0.25)'};
  if (s >= 3.75) return {l:'STRONG',      c:'#2563eb', b:'rgba(37,99,235,0.08)',  bd:'rgba(37,99,235,0.25)'};
  if (s >= 3.0)  return {l:'MEETS EXP.',  c:'#d97706', b:'rgba(217,119,6,0.08)', bd:'rgba(217,119,6,0.25)'};
  if (s >= 2.0)  return {l:'NEEDS WORK',  c:'#ea580c', b:'rgba(234,88,12,0.08)', bd:'rgba(234,88,12,0.25)'};
  return              {l:'POOR',          c:'#e11d48', b:'rgba(225,29,72,0.08)', bd:'rgba(225,29,72,0.25)'};
}

function sc(s) {
  if (s >= 4.5)  return '#059669';
  if (s >= 3.75) return '#2563eb';
  if (s >= 3.0)  return '#d97706';
  if (s >= 2.0)  return '#ea580c';
  return '#e11d48';
}

function fd(d)  { const x = new Date(d); return MON[x.getMonth()] + ' ' + x.getFullYear(); }
function qk(d)  { const x = new Date(d); return x.getFullYear() + '-Q' + Math.ceil((x.getMonth()+1)/3); }
function mk(d)  { const x = new Date(d); return x.getFullYear() + '-' + String(x.getMonth()+1).padStart(2,'0'); }
function yk(d)  { return String(new Date(d).getFullYear()); }

function usb() {
  document.getElementById('sbT').textContent = recs.length;
  document.getElementById('sbP').textContent = new Set(recs.map(r => r.name)).size;
  const avg = recs.length
    ? (recs.reduce((a, r) => a + ws(r), 0) / recs.length).toFixed(2)
    : '—';
  document.getElementById('sbA').textContent = avg;
}

function fil(list) {
  return list.filter(r => {
    if (fTy && r.type !== fTy) return false;
    if (fYr && yk(r.date) !== fYr) return false;
    if (fSr) {
      const q = fSr.toLowerCase();
      if (!((r.name||'').toLowerCase().includes(q) ||
            (r.role||'').toLowerCase().includes(q) ||
            (r.dept||'').toLowerCase().includes(q))) return false;
    }
    return true;
  }).sort((a, b) => {
    if (sCol === 'score') return (ws(b) - ws(a)) * sDir;
    if (sCol === 'date')  return (new Date(b.date) - new Date(a.date)) * Math.sign(sDir);
    return ((a[sCol]||'').localeCompare(b[sCol]||'')) * sDir;
  });
}

function sb(c) { if (sCol===c) sDir*=-1; else { sCol=c; sDir=-1; } render(); }

function gpill(s) {
  const g = grade(s);
  return `<span class="gpill" style="color:${g.c};border-color:${g.bd};background:${g.b}">${g.l}</span>`;
}
function tbadge(t) {
  const cl = t==='Employee' ? 'tEmp' : t==='Consultant' ? 'tCon' : 'tSub';
  return `<span class="tbadge ${cl}">${t}</span>`;
}
function spark(scores) {
  if (scores.length < 2) return '<span style="color:var(--muted);font-size:11px">—</span>';
  return `<div class="spark">${scores.slice(-6).map(s =>
    `<div class="spk" style="height:${Math.max(3,(s/5)*18)}px;background:${sc(s)}"></div>`
  ).join('')}</div>`;
}

function animBars() {
  requestAnimationFrame(() => {
    document.querySelectorAll('.pbf[data-w], .sf[data-w]').forEach(el => {
      const w = el.getAttribute('data-w');
      el.style.width = '0';
      setTimeout(() => el.style.width = w + '%', 80);
    });
    document.querySelectorAll('.hlf[data-w]').forEach(el => {
      const w = el.getAttribute('data-w');
      el.style.width = '0';
      setTimeout(() => el.style.width = w + '%', 80);
    });
  });
}

function toast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('tmsg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function cm() { document.getElementById('mo').classList.remove('open'); }
document.getElementById('mo').addEventListener('click', e => { if (e.target===e.currentTarget) cm(); });

let _confirmCb = null;
function confirm2(title, msg, cb) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent   = msg;
  _confirmCb = cb;
  document.getElementById('confirmModal').classList.add('open');
  document.getElementById('confirmOkBtn').onclick = () => { closeConfirm(); cb(); };
}
function closeConfirm() { document.getElementById('confirmModal').classList.remove('open'); }
document.getElementById('confirmModal').addEventListener('click', e => { if (e.target===e.currentTarget) closeConfirm(); });

// ── Switch view ──────────────────────────────────────────────────
function sw(v) {
  view = v;
  const order = ['dashboard','monthly','quarterly','annual','compare','add','add','add'];
  document.querySelectorAll('.nav-item').forEach((el, i) => el.classList.toggle('active', order[i]===v));
  render();
}

// ── Render ───────────────────────────────────────────────────────
function render() {
  const m = document.getElementById('mainArea');
  if      (view==='dashboard') m.innerHTML = vDash();
  else if (view==='monthly')   m.innerHTML = vPeriod('monthly');
  else if (view==='quarterly') m.innerHTML = vPeriod('quarterly');
  else if (view==='annual')    m.innerHTML = vPeriod('annual');
  else if (view==='compare')   m.innerHTML = vCompare();
  else { m.innerHTML = vAdd(); document.getElementById('fdate').valueAsDate = new Date(); }
  usb();
  animBars();
}

// ── Dashboard ────────────────────────────────────────────────────
function vDash() {
  const n   = recs.length;
  const ppl = new Set(recs.map(r => r.name)).size;
  const avg = n ? recs.reduce((a,r) => a+ws(r), 0)/n : 0;
  const bt  = {Employee:0, Consultant:0, 'Sub-Contractor':0};
  recs.forEach(r => bt[r.type] = (bt[r.type]||0) + 1);
  const top5 = [...recs].sort((a,b) => ws(b)-ws(a)).slice(0,5);
  const pa = P.map(p => {
    const vs = recs.map(r => r.ratings[p.id]||0).filter(v => v>0);
    return {...p, avg: vs.length ? vs.reduce((a,b)=>a+b)/vs.length : 0};
  });

  return `
  <div class="pg-hd">
    <div>
      <div class="pg-title">Score History</div>
      <div class="pg-sub">${n} evaluation${n!==1?'s':''} · ${ppl} individual${ppl!==1?'s':''} tracked</div>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="sw('add')">＋ Add Evaluation</button>
      <button class="btn btn-ghost" onclick="exportCSV()">↓ Export CSV</button>
    </div>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card kc-blue"><div class="kpi-ico">📋</div><div class="kpi-val">${n}</div><div class="kpi-lbl">Total Records</div></div>
    <div class="kpi-card kc-teal"><div class="kpi-ico">👥</div><div class="kpi-val">${ppl}</div><div class="kpi-lbl">People Tracked</div></div>
    <div class="kpi-card kc-amber"><div class="kpi-ico">⭐</div><div class="kpi-val" style="color:${sc(avg)}">${avg.toFixed(2)}</div><div class="kpi-lbl">Avg Weighted Score</div></div>
    <div class="kpi-card kc-blue"><div class="kpi-ico">🏢</div><div class="kpi-val">${bt.Employee||0}</div><div class="kpi-lbl">Employees</div></div>
    <div class="kpi-card kc-amber"><div class="kpi-ico">💼</div><div class="kpi-val">${bt.Consultant||0}</div><div class="kpi-lbl">Consultants</div></div>
    <div class="kpi-card kc-teal"><div class="kpi-ico">🔧</div><div class="kpi-val">${bt['Sub-Contractor']||0}</div><div class="kpi-lbl">Sub-Contractors</div></div>
  </div>

  <div class="two-col">
    <div class="card">
      <div class="card-hd"><div class="card-title">Top Performers</div><div class="card-meta">Highest weighted scores</div></div>
      <div style="padding:8px 18px 12px">
        ${top5.length ? top5.map((r,i) => {
          const s = ws(r);
          const rc = ['trk1','trk2','trk3','trkn','trkn'][i];
          return `<div class="top-i">
            <div class="trk ${rc}">${i+1}</div>
            <div class="ti">
              <div class="tn">${r.name}</div>
              <div class="tm">${r.type} · ${fd(r.date)}</div>
            </div>
            ${gpill(s)}
            <div class="ts" style="color:${sc(s)}">${s.toFixed(2)}</div>
          </div>`;
        }).join('') : '<div class="empty"><div class="empty-ico">🏆</div><div class="empty-s">No records yet.</div></div>'}
      </div>
    </div>

    <div class="card">
      <div class="card-hd"><div class="card-title">Parameter Averages</div><div class="card-meta">Across all evaluations</div></div>
      <div class="pbars">
        ${pa.map(p => `
        <div class="pbr">
          <div class="pbl">${p.s}</div>
          <div class="pbt"><div class="pbf" data-w="${(p.avg/5)*100}" style="background:${sc(p.avg)}"></div></div>
          <div class="pbv">${p.avg > 0 ? p.avg.toFixed(1) : '—'}</div>
        </div>`).join('')}
      </div>
    </div>
  </div>

  ${tblBlock(recs, 'All Evaluations')}`;
}

// ── Period view ──────────────────────────────────────────────────
function vPeriod(mode) {
  const kf = mode==='monthly' ? mk : mode==='quarterly' ? qk : yk;
  const lf = mode==='monthly'
    ? k => { const [y,m]=k.split('-'); return MON[+m-1]+' '+y; }
    : mode==='quarterly' ? k => k.replace('-',' ') : k => k;

  const grp = {};
  recs.forEach(r => { const k=kf(r.date); if(!grp[k]) grp[k]=[]; grp[k].push(r); });
  const keys = Object.keys(grp).sort().reverse();
  const ml = {monthly:'Monthly', quarterly:'Quarterly', annual:'Annual'}[mode];

  if (!keys.length) return `
    <div class="pg-hd"><div><div class="pg-title">${ml} Report</div></div></div>
    <div class="card"><div class="empty">
      <div class="empty-ico">📅</div>
      <div class="empty-t">No Data Yet</div>
      <div class="empty-s">Add evaluations to see ${ml.toLowerCase()} breakdowns.</div>
      <br><button class="btn btn-primary" style="margin-top:12px" onclick="sw('add')">＋ Add Evaluation</button>
    </div></div>`;

  return `
  <div class="pg-hd">
    <div>
      <div class="pg-title">${ml} Report</div>
      <div class="pg-sub">${keys.length} period${keys.length>1?'s':''} · ${recs.length} total records</div>
    </div>
    <button class="btn btn-ghost" onclick="exportCSV()">↓ Export</button>
  </div>
  ${keys.map(k => {
    const rs  = grp[k];
    const avg = rs.reduce((a,r) => a+ws(r), 0) / rs.length;
    const bt  = {};
    rs.forEach(r => bt[r.type]=(bt[r.type]||0)+1);
    return `<div class="pb">
      <div class="ph">
        <div class="pl">${lf(k)}</div>
        ${gpill(avg)}
        <div class="ps">
          <span class="pst">${rs.length} record${rs.length>1?'s':''}</span>
          <span class="pst">Avg: <strong style="color:${sc(avg)};font-family:var(--mono)">${avg.toFixed(2)}</strong></span>
          <span class="pst">${Object.entries(bt).map(([t,n])=>`${n} ${t}`).join(' · ')}</span>
        </div>
      </div>
      ${tblBlock(rs, '')}
    </div>`;
  }).join('')}`;
}

// ── Compare ──────────────────────────────────────────────────────
function vCompare() {
  const ppl = [...new Set(recs.map(r => r.name))].sort();

  if (ppl.length < 2) return `
    <div class="pg-hd"><div class="pg-title">Compare People</div></div>
    <div class="card"><div class="empty">
      <div class="empty-ico">⊞</div>
      <div class="empty-t">Need 2+ People</div>
      <div class="empty-s">Add evaluations for multiple people to compare.</div>
    </div></div>`;

  return `
  <div class="pg-hd">
    <div>
      <div class="pg-title">Compare People</div>
      <div class="pg-sub">Average per parameter · all evaluations combined</div>
    </div>
  </div>
  <div class="card">
    <div class="card-hd">
      <div class="card-title">Comparison Matrix</div>
      <div class="card-meta">${ppl.length} individuals · ${P.length} parameters</div>
    </div>
    <div class="tbl-wrap">
    <table class="cmptbl">
      <thead><tr>
        <th>Name</th><th>Type</th><th>Evals</th>
        ${P.map(p => `<th title="${p.name}">${p.s.split(' ')[0]}<br><span style="color:var(--border2)">${p.w}%</span></th>`).join('')}
        <th>AVG SCORE</th><th>GRADE</th>
      </tr></thead>
      <tbody>
      ${ppl.map(name => {
        const rs  = recs.filter(r => r.name===name);
        const tp  = rs[rs.length-1]?.type || '—';
        const pa  = P.map(p => {
          const vs = rs.map(r => r.ratings[p.id]||0).filter(v => v>0);
          return vs.length ? vs.reduce((a,b)=>a+b)/vs.length : 0;
        });
        const oa = rs.reduce((a,r) => a+ws(r), 0) / rs.length;
        return `<tr>
          <td class="cn">${name}</td>
          <td>${tbadge(tp)}</td>
          <td class="cm">${rs.length}</td>
          ${pa.map(v => `<td style="font-family:var(--mono);font-size:11px;font-weight:600;color:${sc(v)}">${v>0?v.toFixed(1):'—'}</td>`).join('')}
          <td style="font-family:var(--mono);font-size:13px;font-weight:700;color:${sc(oa)}">${oa.toFixed(2)}</td>
          <td>${gpill(oa)}</td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>
    </div>
  </div>`;
}

// ── Add Evaluation ───────────────────────────────────────────────
function vAdd() {
  const names = [...new Set(recs.map(r => r.name))].sort();
  return `
  <div class="pg-hd">
    <div>
      <div class="pg-title">Add Evaluation</div>
      <div class="pg-sub">Log a new performance score record</div>
    </div>
  </div>

  <div class="fsec">
    <div class="fsh open" onclick="tfs(this)">
      <div class="fsh-t">Evaluee Information</div>
      <div class="fsh-tog">+</div>
    </div>
    <div class="fb open">
      <div class="fgrid">
        <div class="ff">
          <label>Full Name *</label>
          <input class="fi" type="text" id="fn" placeholder="e.g. Shairo Kamochi" list="nl" autocomplete="off">
          <datalist id="nl">${names.map(n=>`<option value="${n}">`).join('')}</datalist>
        </div>
        <div class="ff">
          <label>Type *</label>
          <select class="fi" id="fty">
            <option value="">Select…</option>
            <option>Employee</option>
            <option>Consultant</option>
            <option>Sub-Contractor</option>
          </select>
        </div>
        <div class="ff">
          <label>Role / Title</label>
          <input class="fi" type="text" id="frole" placeholder="e.g. Senior Backend Developer">
        </div>
        <div class="ff">
          <label>Department / Project</label>
          <input class="fi" type="text" id="fdept" placeholder="e.g. Engineering">
        </div>
        <div class="ff">
          <label>Evaluation Date *</label>
          <input class="fi" type="date" id="fdate">
        </div>
        <div class="ff">
          <label>Reviewed By</label>
          <input class="fi" type="text" id="frev" placeholder="e.g. Priya Sharma">
        </div>
      </div>

      <div class="sdiv"><div class="sdlbl">Parameter Ratings (1–5 Stars)</div><div class="sdline"></div></div>

      <div class="pgrid">
        ${P.map(p => `
        <div class="pf">
          <div class="pf-name">${p.name} <span>${p.w}%</span></div>
          <div class="srow" id="sr${p.id}">
            ${[5,4,3,2,1].map(s =>
              `<input type="radio" name="sr${p.id}" id="sr${p.id}x${s}" value="${s}">
               <label for="sr${p.id}x${s}" title="${['','Poor','Below Avg','Average','Good','Excellent'][s]}">★</label>`
            ).join('')}
          </div>
        </div>`).join('')}
      </div>

      <div class="ff" style="margin-bottom:18px">
        <label>Notes / Remarks</label>
        <textarea class="fi" id="fnotes" placeholder="General feedback, achievements, areas of improvement…"></textarea>
      </div>

      <div id="dupWarning" style="display:none;padding:10px 12px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;font-size:12px;color:#92400e;margin-bottom:14px">
        ⚠️ A record for this person on this date already exists. Saving will overwrite it.
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="subEval()">✓ Save Evaluation</button>
        <button class="btn btn-ghost" onclick="sw('dashboard')">Cancel</button>
      </div>
    </div>
  </div>`;
}

function tfs(h) { h.classList.toggle('open'); h.nextElementSibling.classList.toggle('open'); }

// Live duplicate check
function checkDup() {
  const name = (document.getElementById('fn')?.value||'').trim().toLowerCase();
  const date = document.getElementById('fdate')?.value;
  const w    = document.getElementById('dupWarning');
  if (!w) return;
  const isDup = name && date && recs.some(r =>
    r.name.trim().toLowerCase() === name && r.date === date
  );
  w.style.display = isDup ? 'block' : 'none';
}

function subEval() {
  const name = (document.getElementById('fn').value||'').trim();
  const type = document.getElementById('fty').value;
  const date = document.getElementById('fdate').value;

  if (!name || !type || !date) { toast('Please fill in Name, Type and Date.'); return; }

  const ratings = {};
  P.forEach(p => {
    const c = document.querySelector(`input[name="sr${p.id}"]:checked`);
    if (c) ratings[p.id] = +c.value;
  });
  if (!Object.keys(ratings).length) { toast('Please rate at least one parameter.'); return; }

  // Duplicate check — overwrite if same name+date
  const dupKey = name.toLowerCase() + '|' + date;
  const existIdx = recs.findIndex(r => r.name.trim().toLowerCase() + '|' + r.date === dupKey);

  const record = {
    id:       existIdx >= 0 ? recs[existIdx].id : uid(),
    name,     type,    date,
    role:     document.getElementById('frole').value.trim(),
    dept:     document.getElementById('fdept').value.trim(),
    reviewer: document.getElementById('frev').value.trim(),
    notes:    document.getElementById('fnotes').value.trim(),
    ratings,  ratedCount: Object.keys(ratings).length,
  };

  if (existIdx >= 0) {
    recs[existIdx] = record;
    toast(`✓ Evaluation for ${name} updated (overwritten).`);
  } else {
    recs.push(record);
    toast(`✓ Evaluation for ${name} saved!`);
  }

  save();
  sw('dashboard');
}

// ── Table block ──────────────────────────────────────────────────
function tblBlock(list, title) {
  const f   = fil(list);
  const ays = [...new Set(recs.map(r => yk(r.date)))].sort().reverse();

  return `
  <div class="card">
    ${title ? `<div class="card-hd">
      <div class="card-title">${title}</div>
      <div class="card-meta">${f.length} of ${list.length} records</div>
    </div>` : ''}
    <div class="fbar">
      <div class="fg">
        <div class="fl">Search</div>
        <input class="fc" type="text" placeholder="Name, role, dept…" value="${fSr}"
          oninput="fSr=this.value;render()" style="min-width:155px">
      </div>
      <div class="fg">
        <div class="fl">Type</div>
        <select class="fc" onchange="fTy=this.value;render()">
          <option value="">All Types</option>
          <option ${fTy==='Employee'?'selected':''}>Employee</option>
          <option ${fTy==='Consultant'?'selected':''}>Consultant</option>
          <option ${fTy==='Sub-Contractor'?'selected':''}>Sub-Contractor</option>
        </select>
      </div>
      <div class="fg">
        <div class="fl">Year</div>
        <select class="fc" onchange="fYr=this.value;render()">
          <option value="">All Years</option>
          ${ays.map(y => `<option ${fYr===y?'selected':''}>${y}</option>`).join('')}
        </select>
      </div>
    </div>

    ${f.length ? `
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th onclick="sb('name')">Name</th>
        <th onclick="sb('type')">Type</th>
        <th onclick="sb('dept')">Dept / Project</th>
        <th onclick="sb('date')">Period</th>
        <th onclick="sb('score')">Score</th>
        <th>Trend</th>
        <th>Grade</th>
        <th></th>
      </tr></thead>
      <tbody>
      ${f.map(r => {
        const s   = ws(r), c = sc(s);
        const pr  = recs.filter(x => x.name===r.name).sort((a,b) => new Date(a.date)-new Date(b.date));
        const idx = pr.findIndex(x => x.id===r.id);
        const pv  = idx > 0 ? ws(pr[idx-1]) : null;
        const dlt = pv !== null
          ? `<span class="delta ${s>=pv?'du':'dd'}">${s>=pv?'▲':'▼'}${Math.abs(s-pv).toFixed(2)}</span>`
          : `<span class="delta dn">—</span>`;
        return `<tr>
          <td>
            <div class="cn">${r.name}</div>
            <div class="cr">${r.role||'—'}</div>
          </td>
          <td>${tbadge(r.type)}</td>
          <td class="cr">${r.dept||'—'}</td>
          <td class="cm">${fd(r.date)}</td>
          <td>
            <div class="sw">
              <div class="sn" style="color:${c}">${s.toFixed(2)}</div>
              <div class="st"><div class="sf" data-w="${(s/5)*100}" style="background:${c}"></div></div>
              ${dlt}
            </div>
          </td>
          <td>${spark(pr.map(x => ws(x)))}</td>
          <td>${gpill(s)}</td>
          <td>
            <div class="racts">
              <button class="abtn" onclick="sd('${r.id}')" title="View Detail">👁</button>
              <button class="abtn d" onclick="dr('${r.id}')" title="Delete">✕</button>
            </div>
          </td>
        </tr>`;
      }).join('')}
      </tbody>
    </table></div>` : `
    <div class="empty">
      <div class="empty-ico">🔍</div>
      <div class="empty-t">No matching records</div>
      <div class="empty-s">Adjust filters or add evaluations.</div>
    </div>`}
  </div>`;
}

// ── Detail modal ─────────────────────────────────────────────────
function sd(id) {
  const r = recs.find(x => x.id===id);
  if (!r) return;
  const s = ws(r), c = sc(s), g = grade(s);
  const pr = recs.filter(x => x.name===r.name).sort((a,b) => new Date(a.date)-new Date(b.date));

  document.getElementById('mb').innerHTML = `
    <div class="mtitle">${r.name}</div>
    <div class="msub">
      ${r.type} · ${r.role||'—'} · ${r.dept||'—'}<br>
      Evaluated: ${fd(r.date)}${r.reviewer ? ' · By: ' + r.reviewer : ''}
    </div>
    <div class="dsr">
      <div class="dbig" style="color:${c}">${s.toFixed(2)}</div>
      <div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--muted)">/ 5.00</div>
        <div style="margin-top:5px">${gpill(s)}</div>
      </div>
    </div>

    <div class="sdiv"><div class="sdlbl">Parameter Breakdown</div><div class="sdline"></div></div>
    <div style="margin-bottom:14px">
      ${P.map(p => {
        const v   = r.ratings[p.id] || 0;
        const ws2 = v ? (v * p.w / 100).toFixed(3) : '—';
        return `<div class="dpr">
          <div class="dpn">${p.name}</div>
          <div class="dps">${v ? '★'.repeat(v)+'☆'.repeat(5-v) : '☆☆☆☆☆'}</div>
          <div class="dpv">${v||'—'}</div>
          <div class="dpc">×${p.w}%=${ws2}</div>
        </div>`;
      }).join('')}
    </div>

    ${r.notes ? `<div style="padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--ink2);line-height:1.6;margin-bottom:14px">${r.notes}</div>` : ''}

    <div class="sdiv"><div class="sdlbl">Evaluation History — ${r.name}</div><div class="sdline"></div></div>
    <div style="margin-bottom:18px">
      ${pr.map(x => {
        const xs = ws(x), xc = sc(xs);
        return `<div class="hl">
          <div class="hld">${fd(x.date)}</div>
          <div class="hlb"><div class="hlf" data-w="${(xs/5)*100}" style="background:${xc}"></div></div>
          <div class="hls" style="color:${xc}">${xs.toFixed(2)}</div>
          ${x.id===r.id ? '<div class="hlt">◀ THIS</div>' : ''}
        </div>`;
      }).join('')}
    </div>

    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="cm()">Close</button>
      <button class="btn btn-danger" onclick="dr('${r.id}');cm()">Delete Record</button>
    </div>`;

  document.getElementById('mo').classList.add('open');
  animBars();
}

// ── Data operations ──────────────────────────────────────────────
function dr(id) {
  recs = recs.filter(r => r.id !== id);
  save();
  render();
  toast('Record deleted.');
}

function confirmClear() {
  confirm2(
    'Clear All Data',
    `This will permanently delete all ${recs.length} record(s). This cannot be undone.`,
    () => {
      recs = [];
      save();
      render();
      toast('All records cleared.');
    }
  );
}

function exportCSV() {
  if (!recs.length) { toast('No data to export.'); return; }
  let csv = `Name,Type,Role,Department,Date,Period,Reviewer,`;
  csv += P.map(p => `"${p.name} (${p.w}%)"`).join(',');
  csv += `,Weighted Score,Grade,Notes\n`;
  recs.forEach(r => {
    const s = ws(r), g = grade(s).l;
    csv += `"${r.name}","${r.type}","${r.role||''}","${r.dept||''}","${r.date}","${fd(r.date)}","${r.reviewer||''}",`;
    csv += P.map(p => r.ratings[p.id]||'').join(',');
    csv += `,"${s.toFixed(2)}","${g}","${(r.notes||'').replace(/"/g,"'")}"\n`;
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = `score_history_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('CSV exported!');
}

// ── Init ─────────────────────────────────────────────────────────
// Bind duplicate check after DOM is ready (for Add view)
document.addEventListener('input', e => {
  if (e.target.id==='fn' || e.target.id==='fdate') checkDup();
});
document.addEventListener('change', e => {
  if (e.target.id==='fdate') checkDup();
});

usb();
render();
</script>
</body>
